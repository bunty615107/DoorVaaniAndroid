name: Issue and PR Bot

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  issue-pr-bot:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Handle newly opened issue or PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const eventName = context.eventName;

            if (eventName === 'issues') {
              const body = context.payload.issue.body || '';
              const lowerBody = body.toLowerCase();

              const missingInfo = [];
              if (!lowerBody.includes('device model')) {
                missingInfo.push('device model');
              }
              if (!lowerBody.includes('android version')) {
                missingInfo.push('Android version');
              }
              if (!lowerBody.includes('app version')) {
                missingInfo.push('app version');
              }

              let comment = 'Thanks for reporting this issue!\n\n';
              if (missingInfo.length > 0) {
                comment += `Please provide the following information if applicable: ${missingInfo.join(', ')}.\n\n`;
              }
              comment += 'We aim to respond within 48h. Please refer to [CONTRIBUTING.md](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/blob/main/CONTRIBUTING.md).\n';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['needs-triage']
              });
            } else if (eventName === 'pull_request') {
              const comment = 'Welcome, and thank you for your PR!\n\nPlease make sure you have reviewed the checklist in [CONTRIBUTING.md](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/blob/main/CONTRIBUTING.md).';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
